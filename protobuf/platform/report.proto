syntax = "proto3";

package platform;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "platform/shared_enums.proto";

option go_package = "github.com/adarko-io/platform-api/go/v4/platform";

// ReportService manages report jobs (exports, and future imports) for a tenant.
service ReportService {
  // List reports for the tenant.
  rpc ListReports(ListReportsRequest) returns (ListReportsResponse) {
    option (google.api.http) = {
      get: "/api/reports"
    };
  }

  // Download a completed report file (server streaming).
  rpc DownloadReport(DownloadReportRequest) returns (stream DownloadReportResponse) {
    option (google.api.http) = {
      get: "/api/reports/{report_id}/download"
    };
  }
}

// A report job record.
message Report {
  string report_id = 1;
  string tenant_id = 2;
  // File name (without path).
  string name = 3;
  ReportType report_type = 4;
  ReportCategory category = 5;
  ReportStatus status = 6;
  // Contextual metadata: e.g. {"type":"consumption","start_time":"...","field":"..."}
  map<string, string> tags = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string error_message = 10;
}

message ListReportsRequest {
  string tenant_id = 1;
  ReportType report_type = 2;
  ReportCategory category = 3;
  ReportStatus status = 4;
  uint32 limit = 5;
  uint32 offset = 6;
}

message ListReportsResponse {
  uint32 total_count = 1;
  repeated Report reports = 2;
}

message DownloadReportRequest {
  string report_id = 1;
  string tenant_id = 2;
}

// Response for downloading a report file (streaming). First message contains metadata,
// subsequent messages contain file chunks.
message DownloadReportResponse {
  oneof data {
    DownloadMetadata metadata = 1;
    bytes chunk = 2;
  }
}
