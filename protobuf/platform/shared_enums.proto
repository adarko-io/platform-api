}

enum MeterStatus {
  // Unknown meter status.
  METER_STATUS_UNKNOWN = 0;

  // Active meter.
  METER_STATUS_ACTIVE = 1;

  // Inactive meter.
  METER_STATUS_INACTIVE = 2;

  // Removed meter.
  METER_STATUS_REMOVED = 3;
}

