enum ConsumerStatus {
  // Unknown consumer status.
  CONSUMER_STATUS_UNKNOWN = 0;

  // Active consumer.
  CONSUMER_STATUS_ACTIVE = 1;

  // Inactive consumer.
  CONSUMER_STATUS_INACTIVE = 2;

  // Terminated consumer.
  CONSUMER_STATUS_TERMINATED = 3;
}

// Upload status enumeration (simplified)
enum UploadStatus {
  // Unspecified status
  UPLOAD_STATUS_UNSPECIFIED = 0;

  // All records processed successfully
  UPLOAD_STATUS_SUCCESS = 1;

  // Some or all records failed
  UPLOAD_STATUS_FAILED = 2;
}

// Supported file types for bulk upload
enum FileType {
  // Unspecified file type
  FILE_TYPE_UNSPECIFIED = 0;

  // CSV file type
  FILE_TYPE_CSV = 1;

  // XLS file type
  FILE_TYPE_XLS = 2;

  // XLSX file type
  FILE_TYPE_XLSX = 3;
}


enum OverdueType {
  OVERDUE_TYPE_UNSPECIFIED = 0;
  OVERDUE_TYPE_NONE        = 1;
  OVERDUE_TYPE_PER_DAY     = 2;
  OVERDUE_TYPE_PER_MONTH   = 3;
  OVERDUE_TYPE_FLAT        = 4;
  OVERDUE_TYPE_PERCENTAGE  = 5;
}

// Device connectivity status enumeration.
enum DeviceConnectivityStatus {
  // Unknown / unset (used as no-filter sentinel).
  DEVICE_CONNECTIVITY_STATUS_UNKNOWN = 0;

  // Device is online (heartbeat active).
  DEVICE_CONNECTIVITY_STATUS_ONLINE = 1;

  // Device is offline (heartbeat expired).
  DEVICE_CONNECTIVITY_STATUS_OFFLINE = 2;

  // Device has never communicated since creation.
  DEVICE_CONNECTIVITY_STATUS_NEVER_SEEN = 3;

  // Some devices in a group are online (aggregate use).
  DEVICE_CONNECTIVITY_STATUS_PARTIALLY_ONLINE = 4;
}