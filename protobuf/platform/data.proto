syntax = "proto3";

package platform;

option go_package = "github.com/adarko-io/platform-api/go/v4/platform";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "platform/shared_enums.proto";
import "google/protobuf/struct.proto";

// DataService is the service providing API methods for managing device data.
// This service is designed to work with TimescaleDB for time-series data storage.
service DataService {
  // Insert device data point(s).
  rpc Insert(InsertDataRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/data"
      body: "*"
    };
  }

  // Push decoded/processed data from databridge (split model).
  rpc PushDataFromDatabridge(PushDataFromDatabridgeRequest) returns (PushDataFromDatabridgeResponse) {
    option (google.api.http) = {
      post: "/api/device-data/decoded"
      body: "*"
    };
  }

  // Push raw original data from databridge (split model).
  rpc PushDataOriginalFromDatabridge(PushDataOriginalFromDatabridgeRequest) returns (PushDataOriginalFromDatabridgeResponse) {
    option (google.api.http) = {
      post: "/api/device-data/original"
      body: "*"
    };
  }

  // Get device data for a specific device within a time range.
  rpc GetDeviceData(GetDeviceDataRequest) returns (GetDeviceDataResponse) {
    option (google.api.http) = {
      get: "/api/data/devices/{id}"
    };
  }

  // Get aggregated device data (for dashboards, analytics).
  rpc GetAggregatedData(GetAggregatedDataRequest) returns (GetAggregatedDataResponse) {
    option (google.api.http) = {
      post: "/api/data/aggregated"
      body: "*"
    };
  }

  // Get latest data point for a device.
  rpc GetLatestData(GetLatestDataRequest) returns (GetLatestDataResponse) {
    option (google.api.http) = {
      get: "/api/data/devices/{id}/latest"
    };
  }

  // Get data for multiple devices.
  rpc GetMultiDeviceData(GetMultiDeviceDataRequest) returns (GetMultiDeviceDataResponse) {
    option (google.api.http) = {
      post: "/api/data/devices/bulk"
      body: "*"
    };
  }

  // Delete device data (for GDPR compliance, data retention).
  rpc DeleteDeviceData(DeleteDeviceDataRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/data/devices/{id}"
    };
  }

  // Get data statistics for a device or application.
  rpc GetDataStats(GetDataStatsRequest) returns (GetDataStatsResponse) {
    option (google.api.http) = {
      post: "/api/data/stats"
      body: "*"
    };
  }

  // Update device location (latest location is stored separately).
  rpc UpdateDeviceLocation(UpdateDeviceLocationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/data/devices/{id}/location"
      body: "*"
    };
  }

  // Get device location (current/latest location).
  rpc GetDeviceLocation(GetDeviceLocationRequest) returns (GetDeviceLocationResponse) {
    option (google.api.http) = {
      get: "/api/data/devices/{id}/location"
    };
  }

  // Get locations for multiple devices.
  rpc GetMultiDeviceLocation(GetMultiDeviceLocationRequest) returns (GetMultiDeviceLocationResponse) {
    option (google.api.http) = {
      post: "/api/data/devices/locations"
      body: "*"
    };
  }

  // Delete device location.
  rpc DeleteDeviceLocation(DeleteDeviceLocationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/data/devices/{id}/location"
    };
  }
}

// DeviceData represents a single data point from a device or gateway.
// Supports data from multiple protocols: LoRaWAN, Cellular, HTTP, MQTT, TCP, UDP, CoAP.
message DeviceData {
  // device ID (UUID from device).
  string id = 1;

  // Timestamp when the data was received.
  google.protobuf.Timestamp timestamp = 2;

  // Raw payload data (base64 encoded).
  google.protobuf.Value data = 4;

}

// Signal quality metrics (protocol-specific).
message SignalMetrics {
  // RSSI (Received Signal Strength Indicator) in dBm (LoRaWAN, Cellular).
  int32 rssi = 1;

  // SNR (Signal-to-Noise Ratio) in dB (LoRaWAN).
  float snr = 2;

  // Spreading factor (LoRaWAN specific).
  uint32 spreading_factor = 3;

  // Bandwidth in Hz (LoRaWAN specific).
  uint32 bandwidth = 4;

  // Frequency in Hz (LoRaWAN specific).
  uint64 frequency = 5;

  // Signal strength percentage (0-100) for other protocols.
  uint32 signal_strength_percent = 6;

  // Link quality indicator (cellular specific).
  uint32 lqi = 7;
}

// Protocol-specific metadata for different transport protocols.
message ProtocolMetadata {
  oneof protocol_data {
    // LoRaWAN specific metadata.
    LoRaWANMetadata lorawan = 1;
    
    // Cellular network metadata (for all cellular protocols).
    CellularMetadata cellular = 2;
    
    // HTTP specific metadata (works with both cellular and WiFi/Ethernet).
    HTTPMetadata http = 3;
    
    // MQTT specific metadata (works with both cellular and WiFi/Ethernet).
    MQTTMetadata mqtt = 4;
    
    // TCP specific metadata (works with both cellular and WiFi/Ethernet).
    TCPMetadata tcp = 5;
    
    // UDP specific metadata (works with both cellular and WiFi/Ethernet).
    UDPMetadata udp = 6;
    
    // CoAP specific metadata (works with both cellular and WiFi/Ethernet).
    CoAPMetadata coap = 7;
    
    // WebSocket specific metadata.
    WebSocketMetadata websocket = 8;
  }
}

// LoRaWAN specific metadata.
message LoRaWANMetadata {
  // Frame counter.
  uint32 f_cnt = 1;
  
  // Frame port.
  uint32 f_port = 2;
  
  // Data rate.
  string data_rate = 3;
  
  // Confirmed/unconfirmed uplink.
  bool confirmed = 4;
  
  // Gateway count that received the message.
  uint32 gateway_count = 5;
}

// Cellular specific metadata.
message CellularMetadata {
  // IMEI of the device.
  string imei = 1;
  
  // IMSI of the SIM card.
  string imsi = 2;
  
  // Cell ID.
  string cell_id = 3;
  
  // Mobile Country Code.
  string mcc = 4;
  
  // Mobile Network Code.
  string mnc = 5;
  
  // Location Area Code.
  string lac = 6;
  
  // Network type (2G, 3G, 4G, 5G, NB-IoT, LTE-M).
  string network_type = 7;
}

// HTTP specific metadata.
message HTTPMetadata {
  // HTTP method used.
  string method = 1;
  
  // Request headers.
  map<string, string> headers = 2;
  
  // Query parameters.
  map<string, string> query_params = 3;
  
  // HTTP status code (for responses).
  uint32 status_code = 4;
  
  // Content type.
  string content_type = 5;
  
  // User agent.
  string user_agent = 6;
  
  // Remote IP address.
  string remote_ip = 7;
}

// MQTT specific metadata.
message MQTTMetadata {
  // Topic the message was published to.
  string topic = 1;
  
  // QoS level (0, 1, 2).
  uint32 qos = 2;
  
  // Retain flag.
  bool retain = 3;
  
  // Message ID.
  string message_id = 4;
  
  // Client ID.
  string client_id = 5;
  
  // Broker hostname/IP.
  string broker = 6;
}

// TCP specific metadata.
message TCPMetadata {
  // Source IP address.
  string source_ip = 1;
  
  // Source port.
  uint32 source_port = 2;
  
  // Destination IP address.
  string destination_ip = 3;
  
  // Destination port.
  uint32 destination_port = 4;
  
  // Connection state.
  string connection_state = 5;
}

// UDP specific metadata.
message UDPMetadata {
  // Source IP address.
  string source_ip = 1;
  
  // Source port.
  uint32 source_port = 2;
  
  // Destination IP address.
  string destination_ip = 3;
  
  // Destination port.
  uint32 destination_port = 4;
  
  // Packet size.
  uint32 packet_size = 5;
}

// CoAP specific metadata.
message CoAPMetadata {
  // CoAP method (GET, POST, PUT, DELETE).
  string method = 1;
  
  // URI path.
  string uri_path = 2;
  
  // Message type (CON, NON, ACK, RST).
  string message_type = 3;
  
  // Message ID.
  uint32 message_id = 4;
  
  // Token.
  bytes token = 5;
  
  // Response code.
  string response_code = 6;
  
  // Content format.
  uint32 content_format = 7;
}

// WebSocket specific metadata.
message WebSocketMetadata {
  // WebSocket subprotocol.
  string subprotocol = 1;
  
  // Message type (text, binary, ping, pong, close).
  string message_type = 2;
  
  // WebSocket endpoint URL.
  string endpoint = 3;
  
  // Connection state.
  string connection_state = 4;
  
  // Remote IP address.
  string remote_ip = 5;
}

// Device location information.
message DeviceLocation {
  // Latitude in decimal degrees.
  double latitude = 1;

  // Longitude in decimal degrees.
  double longitude = 2;

  // Altitude in meters.
  double altitude = 3;

  // Accuracy in meters.
  float accuracy = 4;

  // Location source.
  LocationSource source = 5;
}

// NOTE: Enums moved to shared_enums.proto to avoid conflicts between services.


// Request to insert one decoded/processed data record from the databridge.
// Corresponds to the Data table (split model).
message PushDataFromDatabridgeRequest {
  // Unique ID of this decoded record (Data.ID).
  string id = 1;

  // Shared link to the raw original record (Data.DataID → DataOriginal.DataID).
  string data_id = 2;

  // Platform device ID.
  string device_id = 3;

  // Indicates if the device ID was available in the original payload (some protocols may not provide it).
  bool is_device_id_available = 4;

  // Platform application ID.
  string application_id = 5;

  // Platform tenant ID.
  string tenant_id = 6;

  // Device profile ID.
  string device_profile_id = 7;

  // Device EUI (EUI64 hex string).
  string eui = 8;

  // Transport protocol.
  TransportProtocol protocol = 9;

  // Decoded/processed payload as JSON.
  google.protobuf.Value data = 10;

  // Optional arbitrary metadata.
  google.protobuf.Value metadata = 11;

  // Timestamp from the device payload.
  google.protobuf.Timestamp data_timestamp = 12;

  // Timestamp when the datalogger received the message.
  google.protobuf.Timestamp received_at = 13;
}

// Response from inserting a decoded data record.
message PushDataFromDatabridgeResponse {
  bool success = 1;
  string message = 2;
  // Echoed back Data.ID.
  string id = 3;
  // Echoed back Data.DataID.
  string data_id = 4;
}

// Request to insert one raw original data record from the databridge.
// Corresponds to the DataOriginal table (split model).
message PushDataOriginalFromDatabridgeRequest {
  // Shared key linking this record to its decoded Data rows (DataOriginal.DataID).
  string data_id = 1;

  // Transport protocol.
  TransportProtocol protocol = 2;

  // Raw payload as received (full JSON).
  google.protobuf.Value original_data = 3;

  // Timestamp when the datalogger received the message.
  google.protobuf.Timestamp received_at = 4;
}

// Response from inserting a raw original data record.
message PushDataOriginalFromDatabridgeResponse {
  bool success = 1;
  string message = 2;
  // Echoed back DataOriginal.DataID.
  string data_id = 3;
}

// Request to insert device data.
message InsertDataRequest {
  // Single data point or batch of data points.
  repeated DeviceData data = 1;
}

// Request to get device data.
message GetDeviceDataRequest {
  // device  ID (UUID from device ).
  string id = 1;

  // Start time for data range.
  google.protobuf.Timestamp start_time = 2;

  // End time for data range.
  google.protobuf.Timestamp end_time = 3;

  // Maximum number of data points to return.
  uint32 limit = 4;

  // Offset for pagination.
  uint32 offset = 5;

}

// Response containing device data.
message GetDeviceDataResponse {
  // Total count of data points available.
  uint32 total_count = 1;

  // Data points.
  repeated DeviceData data = 2;
}

// Request for meter consumption data.
// At least one of device_ids, application_id, tenant_id, or device_profile_id must be set.
message GetAggregatedDataRequest {
  // Filter by specific device IDs (optional).
  repeated string device_ids = 1;

  // Filter by application ID — returns data for all devices in this application (optional).
  string application_id = 2;

  // Filter by tenant ID — returns data for all devices in this tenant (optional).
  string tenant_id = 3;

  // Start time (required).
  google.protobuf.Timestamp start_time = 4;

  // End time (required).
  google.protobuf.Timestamp end_time = 5;

  // Bucket granularity: HOUR → hourly, MONTH → monthly, everything else → daily.
  Granularity granularity = 6;

  // Group results by device.
  // false = sum all selected devices into one aggregated time series per bucket.
  bool group_by_device = 7;

  // Maximum number of data points to return (0 = count only).
  uint32 limit = 8;

  // Offset for pagination.
  uint32 offset = 9;

  // Filter by device profile ID — returns data for all devices using this profile (optional).
  string device_profile_id = 10;

  // Timezone for daily/monthly bucket grouping (IANA-based enum).
  // Overrides the tenant's configured timezone when set.
  // Falls back to tenant timezone, then UTC if both are absent.
  Timezone timezone = 11;

  // Filter by asset type (e.g. ASSET_TYPE_WATER_METER).
  // When group_by_device = false and multiple devices are selected,
  // either asset_type or device_profile_id must be set to ensure only
  // compatible device types are summed together.
  AssetType asset_type = 12;

  // Filter by zone ID — resolves to the application(s) mapped to this zone.
  // Optionally combined with asset_type to narrow to a specific meter type within the zone.
  string zone_id = 13;
}

// DeviceValue holds one device's consumption data within a single time bucket.
// data is an empty Struct {} when the device did not communicate in that period (gap-fill).
message DeviceValue {
  // Device ID — empty when group_by_device = false.
  string device_id = 1;

  // Application ID of the device.
  string application_id = 2;

  // Tenant ID of the device.
  string tenant_id = 3;

  // Consumption values keyed by counter field name
  // (e.g. "accumulated_volume_m3", "accumulated_kwh").
  // Empty Struct {} indicates no data for this device in this bucket.
  google.protobuf.Struct data = 4;
}

// AggregatedTimestampBucket groups all device values for one time bucket.
// Every bucket in [start_time, end_time] is always emitted (gap-fill).
message AggregatedTimestampBucket {
  // Bucket start timestamp.
  google.protobuf.Timestamp timestamp = 1;

  // One entry per device (group_by_device = true) or a single summed entry (group_by_device = false).
  repeated DeviceValue values = 2;
}

// One consumption bucket in the response (legacy — kept for reference).
message AggregatedDataPoint {
  // Bucket start time.
  google.protobuf.Timestamp timestamp = 1;

  // Device ID — populated when group_by_device = true or a single device is queried.
  string device_id = 2;

  // Tenant ID of the device.
  string tenant_id = 3;

  // Application ID of the device.
  string application_id = 4;

  // Consumption values keyed by counter field name
  // (e.g. "accumulated_volume_m3", "accumulated_kwh").
  google.protobuf.Value data = 5;
}

// Response containing aggregated data.
message GetAggregatedDataResponse {
  // Total number of time buckets in [start_time, end_time] (used for pagination).
  uint32 total_count = 1;

  // Aggregated data grouped by timestamp, with gap-fill.
  // Every bucket in the requested range is always present.
  repeated AggregatedTimestampBucket data = 2;

  // Timezone that was applied to compute the returned buckets.
  Timezone timezone = 3;
}

// Request to get latest data.
message GetLatestDataRequest {
   // device  ID (UUID from device ).
  string id = 1;

  // Include decoded data in response.
  bool include_decoded = 2;

  // Include signal metrics in response.
  bool include_signal_metrics = 3;
}

// Response containing latest data.
message GetLatestDataResponse {
  // Latest data point (null if no data available).
  DeviceData data = 1;
}

// Request for multi-device data.
message GetMultiDeviceDataRequest {
  // IDs to get data for.
  repeated string ids = 1;

  // Start time for data range.
  google.protobuf.Timestamp start_time = 2;

  // End time for data range.
  google.protobuf.Timestamp end_time = 3;

  // Maximum number of data points per device.
  uint32 limit_per_device = 4;

  // Include decoded data in response.
  bool include_decoded = 5;
}

// Response containing multi-device data.
message GetMultiDeviceDataResponse {
  // Data grouped by EUI.
  map<string, GetDeviceDataResponse> device_data = 1;
}

// Request to delete device data.
message DeleteDeviceDataRequest {
  // device  ID (UUID from device ).
  string id = 1;

  // Start time for deletion range (optional).
  google.protobuf.Timestamp start_time = 2;

  // End time for deletion range (optional).
  google.protobuf.Timestamp end_time = 3;
}

// Request for data statistics.
message GetDataStatsRequest {
  // device ID (optional, if not set, stats for all devices).
  string id = 1;

  // Start time for stats range.
  google.protobuf.Timestamp start_time = 2;

  // End time for stats range.
  google.protobuf.Timestamp end_time = 3;
}

// Data statistics.
message DataStats {
  // Total number of data points.
  uint64 total_count = 1;

  // First data timestamp.
  google.protobuf.Timestamp first_timestamp = 2;

  // Last data timestamp.
  google.protobuf.Timestamp last_timestamp = 3;

  // Average data rate (messages per hour).
  double avg_data_rate = 4;

  // Unique devices count (for application stats).
  uint32 unique_devices = 5;

  // Data size statistics.
  DataSizeStats size_stats = 6;
}

// Data size statistics.
message DataSizeStats {
  // Total bytes stored.
  uint64 total_bytes = 1;

  // Average message size in bytes.
  double avg_message_size = 2;

  // Minimum message size in bytes.
  uint32 min_message_size = 3;

  // Maximum message size in bytes.
  uint32 max_message_size = 4;
}

// Response containing data statistics.
message GetDataStatsResponse {
  // Statistics.
  DataStats stats = 1;
}

// Request to update device location.
message UpdateDeviceLocationRequest {
  // device  ID (UUID from device ).
  string id = 1;

  // Device location.
  DeviceLocation location = 2;

  // Timestamp when location was updated (optional, defaults to current time).
  google.protobuf.Timestamp timestamp = 3;

  // Source that provided this location update.
  string source_info = 4;
}

// Request to get device location.
message GetDeviceLocationRequest {
  // device  ID (UUID from device ).
  string id = 1;
}

// Response containing device location.
message GetDeviceLocationResponse {
  // device  ID (UUID from device ).
  string id = 1;

  // Device location.
  DeviceLocation location = 2;

  // Timestamp when location was last updated.
  google.protobuf.Timestamp updated_at = 3;

  // Source that provided this location.
  string source_info = 4;
}

// Request to get locations for multiple devices.
message GetMultiDeviceLocationRequest {
  // IDs to get locations for.
  repeated string ids = 1;
}

// Response containing multiple device locations.
message GetMultiDeviceLocationResponse {
  // Device locations grouped by ID.
  map<string, GetDeviceLocationResponse> locations = 1;
}

// Request to delete device location.
message DeleteDeviceLocationRequest {
  // device  ID (UUID from device ).
  string id = 1;
}
